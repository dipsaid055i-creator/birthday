<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>happy birthday · pop & fireworks</title>
  <!-- canvas-confetti for fireworks (lightweight and pretty) -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0b0b2b 0%, #1e1a5a 40%, #3e2c75 100%);
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 1rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 60px 60px 40px 40px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 0 4px rgba(255,215,0,0.3) inset;
      padding: 2.5rem 2rem 2rem 2rem;
      max-width: 1000px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255,255,200,0.6);
    }

    h1 {
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: 4px;
      text-shadow: 0 5px 0 #b24592, 0 10px 15px rgba(0,0,0,0.4);
      color: #fcf6bd;
      margin: 0 0 0.2rem 0;
      word-break: break-word;
      transform: rotate(-1deg);
    }

    .sub {
      font-size: 1.8rem;
      color: #ffe98c;
      text-shadow: 2px 2px 0 #a13d80;
      margin-bottom: 1.8rem;
      font-style: italic;
    }

    /* Balloon playground */
    .balloon-stage {
      position: relative;
      width: 100%;
      height: 380px;
      background: rgba(255, 241, 214, 0.1);
      border-radius: 80px 80px 40px 40px;
      margin: 1rem 0 2rem 0;
      overflow: visible;   /* show strings hanging */
      border: 2px dashed rgba(255,255,180,0.5);
      box-shadow: inset 0 -10px 25px rgba(0,0,0,0.6);
    }

    /* ------ BALLOON CSS (pure, with knot & string) ------ */
    .balloon {
      position: absolute;
      width: 48px;
      height: 58px;
      background-color: currentColor;   /* color controlled by js style.color */
      border-radius: 50% 50% 50% 50%;
      box-shadow: inset -5px -8px 8px rgba(0,0,0,0.2), inset 5px 5px 15px rgba(255,255,255,0.7);
      transform-origin: bottom center;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease;
      /* floating liftoff */
      animation: float 3s infinite alternate ease-in-out;
      will-change: transform;
      cursor: pointer;
      filter: drop-shadow(0 10px 6px rgba(0,0,0,0.2));
    }

    /* balloon knot (little darker, same color) */
    .balloon::before {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 8px;
      background-color: currentColor;
      filter: brightness(0.75) saturate(1.5);
      border-radius: 30% 30% 50% 50%;
      box-shadow: 0 2px 3px rgba(0,0,0,0.2);
      z-index: 2;
    }

    /* string */
    .balloon::after {
      content: '';
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      width: 2.5px;
      height: 32px;
      background: linear-gradient(45deg, #aaa, #6d6d6d, #444);
      border-radius: 2px;
      box-shadow: 0 2px 3px rgba(0,0,0,0.2);
      z-index: 1;
    }

    /* floating keyframes */
    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      100% { transform: translateY(-15px) rotate(1.5deg); }
    }

    /* POP animation (triggered by js) */
    .balloon.pop {
      animation: none !important;
      transform: scale(0) rotate(15deg) !important;
      opacity: 0;
      transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55), opacity 0.25s;
      pointer-events: none;
    }

    /* celebrate button */
    .celebrate-btn {
      background: radial-gradient(circle at 30% 10%, #f9d423, #fdaa33);
      border: none;
      padding: 1.5rem 4rem;
      border-radius: 50px;
      font-size: 2.5rem;
      font-weight: bold;
      color: #2c0552;
      text-shadow: 2px 2px 0 #ffdb7c;
      box-shadow: 0 20px 20px -8px #00000080, 0 0 0 4px #ffd966, 0 0 0 8px #9b5de5;
      cursor: pointer;
      transition: all 0.15s;
      margin: 0.5rem 0 0.8rem 0;
      letter-spacing: 3px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    .celebrate-btn:active {
      transform: scale(0.93);
      box-shadow: 0 10px 8px -5px black, 0 0 0 4px gold, 0 0 0 8px #bf6ff0;
    }

    .celebrate-btn i {
      font-size: 2.8rem;
      filter: drop-shadow(2px 4px 4px #7f4f24);
    }

    /* message after button */
    .hint {
      color: #ecd6b9;
      font-size: 1.5rem;
      text-shadow: 2px 2px 0 #42275a;
      margin-top: 0.5rem;
    }

    footer {
      color: #bba5d9;
      margin-top: 1rem;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>🎂 HAPPY BIRTHDAY! 🎂</h1>
  <div class="sub">to you · to you · to you</div>

  <!-- balloon stage will be filled by js -->
  <div id="balloonContainer" class="balloon-stage"></div>

  <!-- big red celebration button -->
  <button class="celebrate-btn" id="celebrateBtn">
    <span>🎈</span> CELEBRATE! <span>🎉</span>
  </button>
  <div class="hint">⬆️ click — balloons POP & fireworks explode ⬆️</div>
  <footer>pop balloons + confetti burst</footer>
</div>

<script>
  (function() {
    // ----- configuration -----
    const BALLOON_COUNT = 18;           // number of happy balloons
    const POP_DURATION = 400;            // ms before respawn (matches css transition + a bit)
    const container = document.getElementById('balloonContainer');
    const celebrateBtn = document.getElementById('celebrateBtn');

    let popTimeout = null;                // handle for scheduled regeneration

    // ----- helper: random between min/max -----
    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    // ----- generate fresh balloons (remove old ones) -----
    function generateBalloons() {
      // remove any existing balloons
      const existing = container.querySelectorAll('.balloon');
      existing.forEach(b => b.remove());

      for (let i = 0; i < BALLOON_COUNT; i++) {
        const balloon = document.createElement('div');
        balloon.className = 'balloon';

        // random bright HSL color (saturation 85–100%, lightness 55–75%)
        const hue = random(0, 360);
        const sat = random(75, 100);
        const light = random(55, 75);
        const color = `hsl(${hue}, ${sat}%, ${light}%)`;

        // set color -> currentColor fills balloon + knot
        balloon.style.color = color;

        // random left position (3% .. 96% to avoid edges)
        const leftPercent = random(3, 96);
        balloon.style.left = leftPercent + '%';

        // random bottom position (so they float at different heights)
        // range 30px .. 280px (container height 380px, keep string visible)
        const bottomPx = random(30, 280);
        balloon.style.bottom = bottomPx + 'px';

        // random slight scale variation (some a bit bigger/smaller)
        const scaleVar = random(0.85, 1.25);
        balloon.style.transform = `scale(${scaleVar})`;
        // keep the floating animation but vary delay
        const animDelay = random(0, 2);
        balloon.style.animationDelay = animDelay + 's';

        // store random scale for pop (if needed, but not required)
        container.appendChild(balloon);
      }
    }

    // ----- pop all existing balloons (add pop class) and schedule respawn -----
    function popBalloons() {
      const balloons = document.querySelectorAll('.balloon');
      if (balloons.length === 0) {
        // in case no balloons (rare), just generate new and maybe pop later? but we generate now.
        generateBalloons();
        // after generating, pop again? to be safe we recall after tiny delay?
        // simpler: just return and let next click handle. but we want pop always on click.
        // So if no balloons, generate and then apply pop after a tick.
        setTimeout(() => {
          const newBalloons = document.querySelectorAll('.balloon');
          newBalloons.forEach(b => b.classList.add('pop'));
        }, 10);
      } else {
        // add pop class to all existing balloons
        balloons.forEach(b => b.classList.add('pop'));
      }

      // clear any scheduled regeneration (to avoid double spawn)
      if (popTimeout) {
        clearTimeout(popTimeout);
        popTimeout = null;
      }

      // schedule regeneration (remove popped & create new balloons)
      popTimeout = setTimeout(() => {
        // remove all balloon elements (they have .pop class now, but just remove all)
        const allBalloons = container.querySelectorAll('.balloon');
        allBalloons.forEach(b => b.remove());

        // create fresh unpopped balloons
        generateBalloons();

        popTimeout = null;
      }, POP_DURATION);
    }

    // ----- FIREWORKS using canvas-confetti (multiple bursts) -----
    function triggerFireworks() {
      // first burst – center
      confetti({
        particleCount: 180,
        spread: 80,
        origin: { y: 0.6 },
        startVelocity: 25,
        colors: ['#ffd166', '#ffb347', '#ff6f61', '#9b5de5', '#f15bb5', '#00bbf9']
      });

      // left side burst after 120ms
      setTimeout(() => {
        confetti({
          particleCount: 100,
          angle: 60,
          spread: 55,
          origin: { x: 0.2, y: 0.5 },
          colors: ['#fee440', '#f95738', '#d81159', '#218380']
        });
      }, 120);

      // right side burst after 200ms
      setTimeout(() => {
        confetti({
          particleCount: 120,
          angle: 120,
          spread: 70,
          origin: { x: 0.8, y: 0.5 },
          colors: ['#f94144', '#f8961e', '#90be6d', '#577590']
        });
      }, 200);

      // random high bursts (like fireworks)
      setTimeout(() => {
        confetti({
          particleCount: 70,
          spread: 110,
          origin: { y: 0.3, x: 0.4 },
          startVelocity: 35,
          colors: ['#f9c74f', '#f9844a', '#d00000', '#ffba08']
        });
        confetti({
          particleCount: 70,
          spread: 110,
          origin: { y: 0.3, x: 0.6 },
          startVelocity: 35,
          colors: ['#ef476f', '#ffd166', '#06d6a0', '#118ab2']
        });
      }, 320);

      // final cascade
      setTimeout(() => {
        confetti({
          particleCount: 200,
          spread: 130,
          origin: { y: 0.4 },
          startVelocity: 20,
          colors: ['#ffbc69', '#f08080', '#c77dff', '#b8f2e6']
        });
      }, 450);
    }

    // ----- main celebration handler (pop + fireworks) -----
    function celebrate() {
      popBalloons();            // add pop class & schedule respawn
      triggerFireworks();       // multiple confetti explosions
    }

    // ----- initial balloons on page load -----
    window.addEventListener('load', () => {
      generateBalloons();

      // extra safety: ensure container has balloons
    });

    // ----- button click listener -----
    celebrateBtn.addEventListener('click', (e) => {
      e.preventDefault();
      celebrate();

      // tiny haptic feedback (vibrate if supported) – just for fun
      if (navigator.vibrate) navigator.vibrate(30);
    });

    // optional: double‑click on stage also pops (just for extra fun)
    container.addEventListener('dblclick', () => {
      celebrate();
    });

    // also ensure that if any balloon is hovered, pointer shows clickable feel
    // but not necessary

  })();
</script>
</body>
</html>
